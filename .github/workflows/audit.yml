name: Sentinel GRC Framework

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  issues: write  # Crucial for Automated Remediation

jobs:
  sentinel-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute Sentinel Engine
        env:
          AUDIT_TOKEN: ${{ secrets.GA_AUDIT_TOKEN }}
        run: python auditor.py

      - name: Archive Compliance Evidence
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-audit-data
          path: compliance_summary.json