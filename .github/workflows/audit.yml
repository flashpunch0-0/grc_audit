name: Continuous GRC Monitoring

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly
  workflow_dispatch: # Manual trigger

permissions:
  contents: read
  security-events: write # Needed to enable vulnerability alerts

jobs:
  audit-and-remediate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run GRC Engine & Auto-Remediation
        env:
          AUDIT_TOKEN: ${{ secrets.GA_AUDIT_TOKEN }}
        run: python auditor.py

      - name: Publish Visual Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: GRC-Executive-Dashboard
          path: dashboard.html